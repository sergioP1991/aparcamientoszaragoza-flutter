    <script>

      /**

      window.showGooglePayDirect = function(options) {
        return new Promise(function(resolve) {
          console.log('═══════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════');

          console.log('═══════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════');
          console.log('🔍 Opciones recibidas:', options);
          console.log('  • amountInCents:', options.amountInCents);
          console.log('  • currency:', options.currency);
          console.log('  • label:', options.label);

          // Si el SDK no está listo (raro con carga síncrona, pero defensivo)
          if (typeof google === 'undefined' || !google.payments || !google.payments.api) {
            console.error('❌ ERROR: Google Pay SDK no cargado');
            console.log('  • typeof google:', typeof google);
            console.log('  • google.payments:', typeof google?.payments);
            console.log('  • google.payments.api:', typeof google?.payments?.api);
            resolve({ success: false, error: 'google_pay_sdk_not_loaded' });
            return;
          }
          console.log('✓ Google Pay SDK detectado');

          var PUBLISHABLE_KEY = 'pk_test_51SuUod2KaK54WVOoow3ceAdHyLefry0S7wHHA5R0SfjFyB9mVyfwpocCmt0adzDFDiwsaM4diLCht1E98oJV8UWU00H20ta2MQ';

          var paymentMethod = {
            type: 'CARD',
            parameters: {
              allowedAuthMethods: ['PAN_ONLY', 'CRYPTOGRAM_3DS'],
              allowedCardNetworks: ['AMEX', 'MASTERCARD', 'VISA', 'DISCOVER'],
            },
            tokenizationSpecification: {
              type: 'PAYMENT_GATEWAY',
              parameters: {
                gateway: 'stripe',
                'stripe:version': '2023-10-16',
                'stripe:publishableKey': PUBLISHABLE_KEY,
                'stripe:accountId': 'acct_1SuUod2KaK54WVOo',
              },
            },
          };

          console.log('🔍 Configuración completa de Google Pay:');
          console.log('  • Método de pago:', paymentMethod);
          console.log('  • Gateway: stripe');
          console.log('  • Stripe Account ID: acct_1SuUod2KaK54WVOo');
          console.log('  • Stripe Version: 2023-10-16');
          console.log('  • Publishable Key: ' + PUBLISHABLE_KEY.substring(0, 20) + '...');

          var client = new google.payments.api.PaymentsClient({ environment: 'TEST' });
          console.log('✓ PaymentsClient creado');

          console.log('🔍 Verificando isReadyToPay()...');

              console.log('✓✓✓ loadPaymentData retornó datos');
              var token = JSON.parse(paymentData.paymentMethodData.tokenizationData.token);

    <script>
      /**
       * Apple Pay / Google Pay via Stripe.js Payment Request API.
       * Funciona en Safari (Apple Pay) y Chrome con Google Pay configurado.
       * SOLO usar para Apple Pay; para Google Pay preferir showGooglePayDirect.
       */
      window.showStripePaymentRequest = function(options) {
        var stripe = _getStripeJs();
        if (!stripe) {
          console.error('❌ Stripe.js no está cargado');
          return Promise.resolve({ success: false, error: 'stripe_not_loaded' });
        }

        var pr = stripe.paymentRequest({
          country:  options.country  || 'ES',
          currency: (options.currency || 'eur').toLowerCase(),
          total: { label: options.label || 'Alquiler plaza', amount: options.amountInCents || 0 },
          requestPayerName:  false,
          requestPayerEmail: false,
        });

        return new Promise(function(resolve) {
          pr.on('paymentmethod', function(evt) {
            evt.complete('success');
            resolve({ success: true, paymentMethodId: evt.paymentMethod.id });
          });
          pr.on('cancel', function() {
            resolve({ success: false, error: 'cancelled' });
          });
          pr.show().catch(function(err) {
            var msg = (err && err.message) ? err.message : 'payment_request_not_available';
            resolve({ success: false, error: msg });
          });
        });
      };

      console.log('✅ window.showStripePaymentRequest definida (Stripe.js — Apple Pay)');
    </script>

  <!-- Inicializar EmailJS ANTES de que cargue Flutter -->
  <script>
    console.log('🔄 Inicializando EmailJS v3...');
    
    // Esperar a que EmailJS esté disponible
    var emailjsReady = false;
    var attempts = 0;
    var maxAttempts = 50;
    
    function initEmailJS() {
      if (typeof emailjs !== 'undefined') {
        emailjs.init('-dh-mInaZZb1fVrkm');
        console.log('✅ EmailJS inicializado correctamente');
        emailjsReady = true;
      } else if (attempts < maxAttempts) {
        attempts++;
        setTimeout(initEmailJS, 100);
      } else {
        console.error('❌ No se pudo cargar EmailJS');
      }
    }
    
    initEmailJS();
    
    // Función global para enviar emails desde Dart
    window.sendEmailViaEmailJS = function(serviceId, templateId, to, name, title) {
      console.log('\n' + '='.repeat(60));
      console.log('📤 ENVIANDO EMAIL CON EMAILJS');
      console.log('='.repeat(60));
      console.log('Service ID:', serviceId);
      console.log('Template ID:', templateId);
      console.log('Parámetros:');
      console.log('  • to:', to);
      console.log('  • name:', name);
      console.log('  • title:', title);

      if (!emailjsReady || typeof emailjs === 'undefined') {
        return Promise.reject(new Error('EmailJS no está inicializado'));
      }

      console.log('\n📨 Llamando emailjs.send()...');
      
      // Enviar el email
      return emailjs.send(serviceId, templateId, {
        to: to,
        name: name,
        title: title
      })
        .then(function(response) {
          console.log('\n' + '='.repeat(60));
          console.log('✅ EMAIL ENVIADO EXITOSAMENTE');
          console.log('='.repeat(60));
          console.log('Status:', response.status);
          console.log('Message ID:', response.text);
          return { 
            success: true, 
            messageId: response.text,
            status: response.status 
          };
        })
        .catch(function(error) {
          console.log('\n' + '='.repeat(60));
          console.error('❌ ERROR AL ENVIAR EMAIL');
          console.error('='.repeat(60));
          console.error('Status:', error.status);
          console.error('Text:', error.text);
          console.error('Error:', error);
          
          throw new Error(`EmailJS Error ${error.status}: ${error.text || error.message}`);
        });
    };

    console.log('✅ Función window.sendEmailViaEmailJS definida');
  </script>
